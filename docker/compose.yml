name: aixsuture

services:
  aixsuture:
    profiles: ["aixsuture"]
    image: aixsuture:dev
    build:
      context: ..
      dockerfile: docker/aixsuture/Dockerfile
      args:
        UID: "${UID:?UID must be set in docker/.env}"
        GID: "${GID:?GID must be set in docker/.env}"
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: ${GPU_UUID}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    volumes:
      - ../aixsuture:/workspace/aixsuture
      - ${DATASETS_DIR}:/workspace/aixsuture/data:ro
      - ${WEIGHTS_DIR}:/opt/weights:ro
      - ${RUNS_DIR}:/workspace/runs
      - uv-cache:/opt/uv-cache
      - uv-python:/opt/uv-python
    working_dir: /workspace/aixsuture
    tty: true
    stdin_open: true

  sam3:
    profiles: ["sam3"]
    image: sam3:dev
    build:
      context: ..
      dockerfile: docker/sam3/Dockerfile
      args:
        UID: "${UID:?UID must be set in docker/.env}"
        GID: "${GID:?GID must be set in docker/.env}"
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: ${GPU_UUID}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    volumes:
      - ../sam3:/workspace/sam3
      - ${DATASETS_DIR}:/workspace/sam3/data:ro
      - ${WEIGHTS_DIR}:/opt/weights:ro
      - ${RUNS_DIR}:/workspace/runs
      - hf-cache:/opt/hf-cache
      - uv-cache:/opt/uv-cache
      - uv-python:/opt/uv-python
    working_dir: /workspace/sam3
    tty: true
    stdin_open: true

volumes:
  uv-cache:
  uv-python:
  hf-cache:
